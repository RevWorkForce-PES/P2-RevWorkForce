#========================================
# Application Configuration
#========================================
# Name of the Spring Boot application
spring.application.name=RevWorkForce
# Server port (can be overridden by environment variable or local config)
server.port=8080

#========================================
# Oracle Database Configuration
#========================================
# JDBC URL for Oracle database
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1

spring.datasource.username=workforce_db
spring.datasource.password=revpassword

# JDBC driver class
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

#========================================
# JPA / Hibernate Configuration
#========================================
# DDL auto: validate schema without modifying DB
spring.jpa.hibernate.ddl-auto=validate

# Show SQL queries in console
spring.jpa.show-sql=true 
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Format SQL for readability
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Disable Open-in-View to avoid session issues
spring.jpa.open-in-view=false

#========================================
# Spring Security Starter username and password
#========================================
# Default username/password for basic authentication
spring.security.user.name=user
spring.security.user.password=user123

#========================================
# HikariCP Connection Pool Configuration
#========================================
# Name of the connection pool
spring.datasource.hikari.pool-name=RevWorkForceHikariCP

# Maximum and minimum connections
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Connection timeout and lifetime (ms)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000

# Test query to validate connections
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

# Auto-commit mode for connections
spring.datasource.hikari.auto-commit=true

#========================================
# Server Configuration
#========================================
# Session timeout in minutes
server.servlet.session.timeout=30m

#========================================
# Thymeleaf Configuration
#========================================
# Disable caching for development (optional)
#spring.thymeleaf.cache=false

# Template location and suffix
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Template mode
spring.thymeleaf.mode=HTML

# Character encoding
spring.thymeleaf.encoding=UTF-8

# Enable Thymeleaf templates
spring.thymeleaf.enabled=true

#========================================
# Logging Configuration
#========================================
# Root log level
logging.level.root=INFO

# Application logging level
logging.level.com.revature.revworkforce=DEBUG

# Spring Security logs
logging.level.org.springframework.security=DEBUG

# Hibernate SQL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# HikariCP connection pool logs
logging.level.com.zaxxer.hikari=DEBUG

# Log file name and rotation settings
logging.file.name=logs/revworkforce.log
logging.file.max-size=10MB
logging.file.max-history=30

#========================================
# Error Handling
#========================================
# Include error message in response (useful for development)
server.error.include-message=always

# Include stacktrace in response on param
server.error.include-stacktrace=on_param

# Include exception in response
server.error.include-exception=true

# Custom error path
server.error.path=/error

# Always show stacktrace and exception (for development)
server.error.include-stacktrace=always
server.error.include-exception=true
server.error.include-message=always

#========================================
# Spring Boot DevTools (Development Only)
#========================================
# Enable automatic restart on code changes
spring.devtools.restart.enabled=true

# Enable live reload in browser
spring.devtools.livereload.enabled=true

#========================================
# Leave Configuration
#========================================
# Maximum continuous leave days allowed
app.leave.max-continuous-days=30

# Notify user X days before leave deadline
app.leave.notification-days-before-deadline=7

#========================================
# Session Configuration
#========================================
# Maximum failed login attempts before lock
app.session.max-failed-login-attempts=5

# Account lock duration in minutes
app.session.account-lock-duration-minutes=15

#========================================
# Notification Settings
#========================================
# Notification expiry in days
app.notification.expiry-days=90

# Maximum number of unread notifications
app.notification.max-unread=100


spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false