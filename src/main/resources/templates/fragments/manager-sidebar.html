<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar real-content" th:fragment="sidebar(active)">
        <div class="sidebar-logo">
            <a th:href="@{/}">
                <img th:src="@{/images/logo complete.png}" alt="RevWorkforce Logo">
            </a>
        </div>

        <nav>
            <a th:href="@{/manager/dashboard}" class="nav-link" th:classappend="${active == 'manager-dashboard.html'} ? 'active' : ''">
                <span class="nav-icon">📊</span> Overview
            </a>
            <a th:href="@{/manager/team}" class="nav-link" th:classappend="${active == 'manager-team.html'} ? 'active' : ''">
                <span class="nav-icon">👥</span> My Team
            </a>
            <a th:href="@{/manager/leave}" class="nav-link" th:classappend="${active == 'manager-leave.html'} ? 'active' : ''">
                <span class="nav-icon">📅</span> Leave Requests
            </a>
            <a th:href="@{/manager/performance}" class="nav-link" th:classappend="${active == 'manager-performance.html'} ? 'active' : ''">
                <span class="nav-icon">⭐</span> Performance
            </a>
        </nav>

        <div class="logout-container">
            <a th:href="@{/login}" class="btn-logout">Logout</a>
        </div>
    </aside>
</body>
</html>
