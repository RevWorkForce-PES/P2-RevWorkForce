<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}"></head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="fas fa-key me-2"></i>Change Password
                        </h4>
                    </div>
                    <div class="card-body p-4">
                        <!-- First Login Alert -->
                        <div th:if="${firstLogin}" class="alert alert-warning alert-permanent" role="alert">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            <strong>First Time Login:</strong>
                            <span th:text="${message}"></span>
                        </div>
                        
                        <!-- Success Message -->
                        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="fas fa-check-circle me-2"></i>
                            <span th:text="${success}">Success message</span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        
                        <!-- Error Message -->
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-circle me-2"></i>
                            <span th:text="${error}">Error message</span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        
                        <!-- Change Password Form -->
                        <form th:action="@{/change-password}" method="post" th:object="${changePasswordRequest}">
                            <div class="mb-3">
                                <label for="currentPassword" class="form-label">
                                    <i class="fas fa-lock me-1"></i>Current Password
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" 
                                           id="currentPassword" 
                                           th:field="*{currentPassword}"
                                           placeholder="Enter current password" 
                                           required>
                                    <button class="btn btn-outline-secondary" type="button" 
                                            onclick="togglePasswordField('currentPassword')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="newPassword" class="form-label">
                                    <i class="fas fa-key me-1"></i>New Password
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" 
                                           id="newPassword" 
                                           th:field="*{newPassword}"
                                           placeholder="Enter new password" 
                                           minlength="8"
                                           required>
                                    <button class="btn btn-outline-secondary" type="button" 
                                            onclick="togglePasswordField('newPassword')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <small class="text-muted">
                                    Password must be at least 8 characters with uppercase, lowercase, and digit
                                </small>
                            </div>
                            
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">
                                    <i class="fas fa-check-circle me-1"></i>Confirm New Password
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" 
                                           id="confirmPassword" 
                                           th:field="*{confirmPassword}"
                                           placeholder="Confirm new password" 
                                           required>
                                    <button class="btn btn-outline-secondary" type="button" 
                                            onclick="togglePasswordField('confirmPassword')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <!-- Password Strength Indicator -->
                            <div class="mb-3">
                                <div class="progress" style="height: 5px;">
                                    <div id="passwordStrength" class="progress-bar" 
                                         role="progressbar" style="width: 0%"></div>
                                </div>
                                <small id="passwordStrengthText" class="text-muted"></small>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-save me-2"></i>Change Password
                                </button>
                                <a th:href="@{/dashboard}" class="btn btn-outline-secondary">
                                    <i class="fas fa-times me-2"></i>Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/footer :: scripts}"></div>
    
    <script>
        function togglePasswordField(fieldId) {
            const field = document.getElementById(fieldId);
            const button = field.nextElementSibling;
            const icon = button.querySelector('i');
            
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        // Password strength indicator
        document.getElementById('newPassword').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('passwordStrength');
            const strengthText = document.getElementById('passwordStrengthText');
            
            let strength = 0;
            let text = '';
            let color = '';
            
            if (password.length >= 8) strength += 25;
            if (/[a-z]/.test(password)) strength += 25;
            if (/[A-Z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password)) strength += 25;
            
            if (strength <= 25) {
                text = 'Weak';
                color = 'bg-danger';
            } else if (strength <= 50) {
                text = 'Fair';
                color = 'bg-warning';
            } else if (strength <= 75) {
                text = 'Good';
                color = 'bg-info';
            } else {
                text = 'Strong';
                color = 'bg-success';
            }
            
            strengthBar.style.width = strength + '%';
            strengthBar.className = 'progress-bar ' + color;
            strengthText.textContent = 'Password strength: ' + text;
        });
        
        // Confirm password validation
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = this.value;
            
            if (newPassword !== confirmPassword) {
                this.setCustomValidity('Passwords do not match');
            } else {
                this.setCustomValidity('');
            }
        });
    </script>
</body>
</html>
