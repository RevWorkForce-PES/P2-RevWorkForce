<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - RevWorkforce</title>
    <link rel="stylesheet" th:href="@{/styles/common/global.css}">
    <link rel="stylesheet" th:href="@{/styles/auth/auth.css}">
</head>

<body class="page-loading">
    <div class="auth-wrapper">
        <div class="auth-image">
            <video autoplay muted loop playsinline class="auth-video">
                <!-- Using the same video as login for consistency -->
                <source th:src="@{/assets/login.mp4}" type="video/mp4">
            </video>
            <div class="auth-image-overlay"></div>
            <div class="auth-image-content">
                <h1>Secure Your Account</h1>
                <p>Ensure your credentials are safe and updated.</p>
            </div>
        </div>
        <div class="auth-form-container">
            <!-- Skeleton Loader -->
            <div class="skeleton-overlay" style="width: 100%; max-width: 400px; padding: 20px;">
                <div style="display: flex; justify-content: center; margin-bottom: 0px;">
                    <div class="skeleton" style="width: 220px; height: 220px; border-radius: 50%;"></div>
                </div>
                <div class="skeleton skeleton-text" style="height: 36px; width: 60%; margin: 20px auto 30px;"></div>
                <div class="skeleton skeleton-text" style="width: 20%;"></div>
                <div class="skeleton skeleton-text" style="height: 50px; margin-bottom: 20px; border-radius: 12px;"></div>
                <div class="skeleton skeleton-text" style="width: 25%;"></div>
                <div class="skeleton skeleton-text" style="height: 50px; margin-bottom: 20px; border-radius: 12px;"></div>
                <div class="skeleton skeleton-text" style="width: 25%;"></div>
                <div class="skeleton skeleton-text" style="height: 50px; margin-bottom: 20px; border-radius: 12px;"></div>
                <div class="skeleton skeleton-btn" style="height: 50px; border-radius: 12px;"></div>
            </div>

            <form class="form real-content" th:action="@{/change-password}" th:object="${changePasswordRequest}" method="POST">
                <div class="form-header">
                    <div style="text-align: center; margin-bottom: 0px;">
                        <a th:href="@{/}">
                            <img th:src="@{/assets/logo complete.png}" alt="Logo" class="auth-logo">
                        </a>
                    </div>
                    <h2>Change <span style="color: #ea580c;">Password</span></h2>
                    
                    <p th:if="${firstLogin}" style="color: #f59e0b; margin-top: 10px; font-size: 0.9rem;">
                        For security reasons, please change your password on first login.
                    </p>
                </div>

                <!-- Global Error Message -->
                <div th:if="${error}" class="alert alert-error"
                    style="background-color: #fef2f2; color: #ef4444; border: 1px solid #fca5a5; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; display: flex; align-items: flex-start; gap: 8px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 2px;">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <span th:text="${error}">Error message</span>
                </div>
                
                <!-- Success Message -->
                <div th:if="${success}" class="alert alert-success"
                    style="background-color: #ecfdf5; color: #10b981; border: 1px solid #6ee7b7; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; display: flex; align-items: flex-start; gap: 8px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 2px;">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <span th:text="${success}">Success message</span>
                </div>

                <div class="flex-column">
                    <label>Current Password</label>
                </div>
                <div class="inputForm">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" class="input" placeholder="Current Password" required th:field="*{oldPassword}">
                </div>
                <!-- Field error -->
                <div th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}" style="color: #ef4444; font-size: 0.8rem; margin-top: 5px;"></div>

                <div class="flex-column" style="margin-top: 16px;">
                    <label>New Password</label>
                </div>
                <div class="inputForm">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" class="input" placeholder="New Password" required th:field="*{newPassword}">
                </div>
                <div th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}" style="color: #ef4444; font-size: 0.8rem; margin-top: 5px;"></div>

                <div class="flex-column" style="margin-top: 16px;">
                    <label>Confirm New Password</label>
                </div>
                <div class="inputForm">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    <input type="password" class="input" placeholder="Confirm Password" required th:field="*{confirmPassword}">
                </div>
                <div th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" style="color: #ef4444; font-size: 0.8rem; margin-top: 5px;"></div>

                <div class="flex-row" style="justify-content: flex-end; margin-top: 10px;">
                    <a th:if="${!firstLogin}" th:href="@{/dashboard}" class="span" style="color: #6b7280;">Cancel & Return</a>
                </div>

                <button type="submit" class="button-submit" style="background-color: #111; color: white; margin-top: 20px;">
                    Change Password
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const removeSkeleton = () => {
                document.body.classList.remove('page-loading');
            };

            if (document.readyState === 'complete') {
                removeSkeleton();
            } else {
                window.addEventListener('load', removeSkeleton);
            }
        });
    </script>
</body>

</html>
