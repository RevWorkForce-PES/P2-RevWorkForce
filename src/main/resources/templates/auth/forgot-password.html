<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - RevWorkforce</title>
    <!-- Thymeleaf compatibility note: adjust paths to th:href="@{/styles/global.css}" -->
    <link rel="stylesheet" th:href="@{/styles/common/global.css}">
    <link rel="stylesheet" th:href="@{/styles/auth/auth.css}">
</head>

<body class="page-loading">
    <div class="auth-wrapper">
        <div class="auth-image">
            <video autoplay muted loop playsinline class="auth-video">
                <source th:src="@{/assets/forgotpassword.mp4}" type="video/mp4">
            </video>
            <div class="auth-image-overlay"></div>
            <div class="auth-image-content">
                <h1>Welcome to City Voice</h1>
                <p>Your platform for civic engagement.</p>
            </div>
        </div>
        <div class="auth-form-container">
            <!-- Skeleton Loader -->
            <div class="skeleton-overlay" style="width: 100%; max-width: 400px; padding: 20px;">
                <div style="display: flex; justify-content: center; margin-bottom: 24px;">
                    <div class="skeleton" style="width: 220px; height: 100px; border-radius: 12px;"></div>
                </div>
                <div class="skeleton skeleton-text" style="height: 36px; width: 50%; margin: 0 auto 10px;"></div>
                <div class="skeleton skeleton-text" style="height: 45px; width: 90%; margin: 0 auto 30px;"></div>
                <div class="skeleton skeleton-text" style="width: 30%;"></div>
                <div class="skeleton skeleton-text" style="height: 50px; margin-bottom: 20px; border-radius: 12px;">
                </div>
                <div class="skeleton skeleton-btn" style="height: 50px; border-radius: 12px;"></div>
                <div class="skeleton skeleton-text" style="width: 40%; margin: 20px auto 0;"></div>
            </div>

            <form class="form real-content" action="#" method="POST">
                <div class="form-header">
                    <div style="text-align: center; margin-bottom: 24px;">
                        <a th:href="@{/}">
                            <img th:src="@{/assets/logo complete.png}" alt="Logo" class="auth-logo">
                        </a>
                    </div>
                    <h2>Verify <span style="color: #ea580c;">Identity</span></h2>
                    <p
                        style="color: var(--muted-foreground); font-size: 14px; text-align: center; margin-top: 8px; line-height: 1.4;">
                        Enter your email and answer your security question to receive a password reset link.
                    </p>
                </div>

                <div class="flex-column" style="margin-top: 10px;">
                    <label>Email address</label>
                </div>
                <div class="inputForm" style="margin-bottom: 16px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"></path>
                    </svg>
                    <input type="email" class="input" placeholder="Enter your Email" required name="email">
                </div>

                <!-- Security Question Field -->
                <div class="flex-column">
                    <label>Security Question: What was the name of your first pet?</label>
                </div>
                <div class="inputForm">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4">
                        </path>
                    </svg>
                    <input type="text" class="input" placeholder="Enter your answer" required name="securityAnswer">
                </div>

                <button type="submit" class="button-submit" style="background-color: #111; color: white;">Send Reset
                    Link</button>

                <a th:href="@{/login}" class="btn" style="text-decoration: none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to Login
                </a>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const removeSkeleton = () => {
                document.body.classList.remove('page-loading');
            };

            if (document.readyState === 'complete') {
                removeSkeleton();
            } else {
                window.addEventListener('load', removeSkeleton);
            }
        });
    </script>
</body>

</html>
