<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}"></head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <div class="container mt-4">
        <!-- Page Header -->
        <div class="row mb-4">
            <div class="col-12">
                <h2>
                    <i class="fas fa-edit me-2"></i>Edit Profile
                </h2>
                <p class="text-muted">Update your contact information and emergency contact details</p>
            </div>
        </div>
        
        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <!-- Profile Edit Form -->
        <form th:action="@{/employee/profile/update}" method="post" th:object="${employeeDTO}">
            
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Personal Information</h5>
                    <small>Read-only fields cannot be modified</small>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Employee ID</label>
                            <input type="text" class="form-control" 
                                   th:value="${employeeDTO.employeeId}" readonly>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" 
                                   th:value="${employeeDTO.fullName}" readonly>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" 
                                   th:value="${employeeDTO.email}" readonly>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone *</label>
                            <input type="text" class="form-control" id="phone" 
                                   th:field="*{phone}" 
                                   placeholder="10-digit mobile number" required>
                            <span class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Address Information -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Address Information</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="address" class="form-label">Address</label>
                            <textarea class="form-control" id="address" 
                                      th:field="*{address}" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="city" class="form-label">City</label>
                            <input type="text" class="form-control" id="city" th:field="*{city}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="state" class="form-label">State</label>
                            <input type="text" class="form-control" id="state" th:field="*{state}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="postalCode" class="form-label">Postal Code</label>
                            <input type="text" class="form-control" id="postalCode" 
                                   th:field="*{postalCode}" placeholder="6-digit PIN">
                            <span class="text-danger" th:if="${#fields.hasErrors('postalCode')}" th:errors="*{postalCode}"></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Emergency Contact -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Emergency Contact</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="emergencyContactName" class="form-label">Contact Name</label>
                            <input type="text" class="form-control" id="emergencyContactName" 
                                   th:field="*{emergencyContactName}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="emergencyContactPhone" class="form-label">Contact Phone</label>
                            <input type="text" class="form-control" id="emergencyContactPhone" 
                                   th:field="*{emergencyContactPhone}" 
                                   placeholder="10-digit mobile number">
                            <span class="text-danger" th:if="${#fields.hasErrors('emergencyContactPhone')}" th:errors="*{emergencyContactPhone}"></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Employment Information (Read-only) -->
            <div class="card mb-4">
                <div class="card-header bg-secondary text-white">
                    <h5 class="mb-0">Employment Information (Read-only)</h5>
                </div>
                <div class="card-body bg-light">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Department</label>
                            <input type="text" class="form-control" 
                                   th:value="${employeeDTO.departmentName}" readonly>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Designation</label>
                            <input type="text" class="form-control" 
                                   th:value="${employeeDTO.designationName}" readonly>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Manager</label>
                            <input type="text" class="form-control" 
                                   th:value="${employeeDTO.managerName != null ? employeeDTO.managerName : 'No Manager'}" 
                                   readonly>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Joining Date</label>
                            <input type="text" class="form-control" 
                                   th:value="${#temporals.format(employeeDTO.joiningDate, 'dd MMM yyyy')}" 
                                   readonly>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Form Actions -->
            <div class="row mb-4">
                <div class="col-12">
                    <button type="submit" class="btn btn-primary btn-lg me-2">
                        <i class="fas fa-save me-2"></i>Update Profile
                    </button>
                    <a th:href="@{/employee/profile}" class="btn btn-secondary btn-lg">
                        <i class="fas fa-times me-2"></i>Cancel
                    </a>
                </div>
            </div>
        </form>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
