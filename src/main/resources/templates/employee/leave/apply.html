<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h3 class="mb-4">
        <i class="fas fa-calendar-plus me-2"></i>Apply Leave
    </h3>

    <div class="card shadow-sm">
        <div class="card-body">

            <form th:action="@{/leave/employee/apply}"
                  th:object="${leaveApplicationDTO}"
                  method="post">

                <div class="row mb-3">

                    <div class="col-md-4">
                        <label class="form-label">Leave Type</label>
                       <select th:field="*{leaveType}" 
        class="form-select" required>
    <option value="">Select Leave Type</option>
    <option th:each="type : ${leaveTypes}"
            th:value="${type.leaveCode}"
            th:text="${type.leaveName}">
    </option>
</select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Start Date</label>
                        <input type="date"
                               th:field="*{startDate}"
                               class="form-control"
                               required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">End Date</label>
                        <input type="date"
                               th:field="*{endDate}"
                               class="form-control"
                               required>
                    </div>

                </div>

                <div class="mb-3">
                    <label class="form-label">Reason</label>
                    <textarea th:field="*{reason}"
                              class="form-control"
                              rows="3"
                              required></textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                    Submit
                </button>

            </form>

        </div>
    </div>

    <!-- Leave Balance Cards -->
    <div class="row mt-4" th:if="${balances != null}">
        <div class="col-md-3 mb-3"
             th:each="b : ${balances}">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                     <h5 th:text="${b.leaveTypeName}">Casual Leave</h5>
                    <p>Allocated: <span th:text="${b.totalAllocated}">0</span></p>
                    <p>Used: <span th:text="${b.usedLeaves}">0</span></p>
                    <p class="text-success">
                        Remaining:
                        <span th:text="${b.remainingBalance}">0</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/footer :: scripts}"></div>

</body>
</html>
