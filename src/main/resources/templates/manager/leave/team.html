<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h3 class="mb-4">
        <i class="fas fa-users me-2"></i>Team Leave History
    </h3>

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-bordered table-striped">
                <thead>
                <tr>
                    <th>Employee</th>
                    <th>Type</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
               
                <tr th:each="leave : ${team}">
    <td th:text="${leave.employee.fullName}">Name</td>
    <td th:text="${leave.leaveType.leaveCode}">Type</td>
    <td th:text="${leave.startDate}">Start</td>
    <td th:text="${leave.endDate}">End</td>
    <td th:text="${leave.status}">Status</td>
</tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
