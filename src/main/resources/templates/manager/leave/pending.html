<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h3 class="mb-4">
        <i class="fas fa-clock me-2"></i>Pending Leave Requests
    </h3>

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-bordered table-striped">
                <thead>
                <tr>
                    <th>Employee</th>
                    <th>Type</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Days</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="leave : ${pending}">
                    <td th:text="${leave.employee.fullName}"></td>
                    <td th:text="${leave.leaveType.leaveCode}"></td>
                    <td th:text="${leave.startDate}"></td>
                    <td th:text="${leave.endDate}"></td>
                    <td th:text="${leave.totalDays}"></td>
                    <td>
                        <a th:href="@{/leave/manager/review/{id}(id=${leave.applicationId})}"
                           class="btn btn-sm btn-primary">
                            Review
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
