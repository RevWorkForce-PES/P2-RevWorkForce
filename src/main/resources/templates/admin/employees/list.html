<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}"></head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <div class="container-fluid mt-4">
        <!-- Page Header -->
        <div class="row mb-4">
            <div class="col-md-6">
                <h2>
                    <i class="fas fa-users me-2"></i>Employee Management
                </h2>
            </div>
            <div class="col-md-6 text-end">
                <a th:href="@{/admin/employees/add}" class="btn btn-primary">
                    <i class="fas fa-user-plus me-2"></i>Add Employee
                </a>
            </div>
        </div>
        
        <!-- Success/Error Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <!-- Search & Filter Card -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/admin/employees}" method="get">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Search</label>
                            <input type="text" class="form-control" name="keyword" 
                                   th:value="${criteria.keyword}"
                                   placeholder="Name, Email, or Employee ID">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Department</label>
                            <select class="form-select" name="departmentId" th:value="${criteria.departmentId}">
                                <option value="">All Departments</option>
                                <option th:each="dept : ${departments}" 
                                        th:value="${dept.departmentId}"
                                        th:text="${dept.departmentName}"
                                        th:selected="${criteria.departmentId != null && criteria.departmentId == dept.departmentId}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Designation</label>
                            <select class="form-select" name="designationId" th:value="${criteria.designationId}">
                                <option value="">All Designations</option>
                                <option th:each="desig : ${designations}" 
                                        th:value="${desig.designationId}"
                                        th:text="${desig.designationName}"
                                        th:selected="${criteria.designationId != null && criteria.designationId == desig.designationId}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Status</label>
                            <select class="form-select" name="status" th:value="${criteria.status}">
                                <option value="">All Status</option>
                                <option th:each="stat : ${statuses}" 
                                        th:value="${stat}"
                                        th:text="${stat}"
                                        th:selected="${criteria.status != null && criteria.status == stat}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">&nbsp;</label>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-search me-2"></i>Search
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Employee Table -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" id="employeeTable">
                        <thead>
                            <tr>
                                <th>Employee ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Department</th>
                                <th>Designation</th>
                                <th>Status</th>
                                <th>Roles</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="emp : ${employees}">
                                <td>
                                    <strong th:text="${emp.employeeId}"></strong>
                                </td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="avatar-circle me-2">
                                            <span th:text="${#strings.substring(emp.firstName, 0, 1) + #strings.substring(emp.lastName, 0, 1)}"></span>
                                        </div>
                                        <span th:text="${emp.fullName}"></span>
                                    </div>
                                </td>
                                <td th:text="${emp.email}"></td>
                                <td th:text="${emp.departmentName}"></td>
                                <td th:text="${emp.designationName}"></td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${emp.status.name() == 'ACTIVE' ? 'bg-success' : 
                                                          emp.status.name() == 'INACTIVE' ? 'bg-secondary' : 
                                                          emp.status.name() == 'ON_LEAVE' ? 'bg-warning' : 'bg-danger'}"
                                          th:text="${emp.status}">
                                    </span>
                                </td>
                                <td>
                                    <span th:each="role, iterStat : ${emp.roleNames}" 
                                          class="badge bg-primary me-1"
                                          th:text="${role}">
                                    </span>
                                </td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/admin/employees/view/{id}(id=${emp.employeeId})}" 
                                           class="btn btn-sm btn-info" title="View">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                        <a th:href="@{/admin/employees/edit/{id}(id=${emp.employeeId})}" 
                                           class="btn btn-sm btn-warning" title="Edit">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <button type="button" 
                                                class="btn btn-sm btn-danger" 
                                                title="Deactivate"
                                                th:if="${emp.status.name() == 'ACTIVE'}"
                                                onclick="confirmDeactivate(this.getAttribute('data-id'), this.getAttribute('data-name'))"
                                                th:attr="data-id=${emp.employeeId}, data-name=${emp.fullName}">
                                            <i class="fas fa-ban"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div th:if="${#lists.isEmpty(employees)}" class="text-center py-5">
                    <i class="fas fa-users fa-3x text-muted mb-3"></i>
                    <p class="text-muted">No employees found</p>
                </div>
            </div>
        </div>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/footer :: scripts}"></div>
    
    <script>
        // DataTables initialization
        $(document).ready(function() {
            $('#employeeTable').DataTable({
                "pageLength": 25,
                "order": [[1, "asc"]],
                "language": {
                    "search": "Search:",
                    "lengthMenu": "Show _MENU_ employees per page"
                }
            });
        });
        
        // Confirm deactivate
        function confirmDeactivate(employeeId, employeeName) {
            if (confirm('Are you sure you want to deactivate ' + employeeName + '?')) {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = '/admin/employees/deactivate/' + employeeId;
                document.body.appendChild(form);
                form.submit();
            }
        }
    </script>
    
    <style>
        .avatar-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00897B, #00695C);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</body>
</html>
