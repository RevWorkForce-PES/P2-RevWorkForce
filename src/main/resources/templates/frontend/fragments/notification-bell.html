<div th:fragment="notificationBell">
  
    <div class="dropdown">
        <a class="nav-link position-relative"
           href="#"
           id="notificationDropdown"
           role="button"
           data-bs-toggle="dropdown"
           aria-expanded="false">

            <i class="fas fa-bell fa-lg"></i>

     <span id="notificationBadge"
      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
      style="font-size:0.7rem; display:none;">
</span>
        </a>

        <ul class="dropdown-menu dropdown-menu-end shadow"
            aria-labelledby="notificationDropdown"
            style="width: 350px; max-height: 400px; overflow-y: auto;">

           
              <li class="dropdown-header d-flex justify-content-between align-items-center">
    <strong>Notifications</strong>

    <div>
        <form th:action="@{/notifications/mark-all-read}" method="post" style="display:inline;">
            <button type="submit"
                    class="btn btn-link btn-sm p-0 me-2">
                Mark all as read
            </button>
        </form>

        <a href="/notifications" class="ms-2">View All Activity</a> 
    </div>
</li>

            <li><hr class="dropdown-divider"></li>

            <li id="notificationDropdownList">
    <div class="text-center p-3 text-muted">
        Loading...
    </div>
</li>

        </ul>
    </div>

</div>
<script>

document.addEventListener("DOMContentLoaded", function () {

    const badge = document.getElementById("notificationBadge");
    const list = document.getElementById("notificationDropdownList");

    function loadUnreadCount() {

        fetch("/api/notifications/unread-count")
        .then(res => res.text())
        .then(count => {

            const num = parseInt(count) || 0;

            if(num > 0){

                badge.style.display = "inline-block";
                badge.innerText = num;

            }else{

                badge.style.display = "none";

            }

        });

    }

    function loadNotifications(){

        fetch("/api/notifications/recent?limit=5")
        .then(res => res.json())
        .then(data => {

            list.innerHTML = "";

            if(data.length === 0){

                list.innerHTML =
                `<div class="text-center p-3 text-muted">
                    No notifications
                </div>`;

                return;
            }

            data.forEach(n => {

                const item = document.createElement("li");

                item.innerHTML = `
                <a class="dropdown-item d-flex justify-content-between align-items-start"
                   href="/notifications">

                    <div>
                        <strong>${n.title}</strong>
                        <div class="small text-muted">${n.message}</div>
                    </div>

                    ${n.isRead === 'N'
                        ? '<span class="badge bg-primary">New</span>'
                        : ''
                    }

                </a>`;

                list.appendChild(item);

            });

        });

    }

    loadUnreadCount();

    document.getElementById("notificationDropdown")
        .addEventListener("click", function () {
            loadNotifications();
        });

    setInterval(loadUnreadCount, 30000);

});

</script>
