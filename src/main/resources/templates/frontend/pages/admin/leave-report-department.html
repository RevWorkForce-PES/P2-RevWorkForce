<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Department Leave Report</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="app-container">

<app-sidebar></app-sidebar>

<main class="main-content">

<app-navbar page-title="Department Leave Report"></app-navbar>

<div class="page-wrapper">

<div class="card">

<h2>Department Leave Report</h2>

<form method="get" action="/admin/reports/department">

<select name="departmentId">

<option value="">Select Department</option>

<option th:each="dept : ${departments}"
        th:value="${dept.departmentId}"
        th:text="${dept.departmentName}">
</option>

</select>

<button type="submit" class="btn btn-primary">
Generate Report
</button>

</form>

<br>

<table class="table" th:if="${leaves != null}">

<thead>
<tr>
<th>Employee</th>
<th>Leave Type</th>
<th>Start</th>
<th>End</th>
<th>Status</th>
</tr>
</thead>
<tbody>

<tr th:if="${#lists.isEmpty(leaves)}">
<td colspan="5" style="text-align:center;padding:20px;color:#777;">
<i class="fas fa-info-circle"></i>
No leave records found for the selected department.
</td>
</tr>

<tr th:each="l : ${leaves}">
<td th:text="${l.employee.fullName}"></td>
<td th:text="${l.leaveType.leaveName}"></td>
<td th:text="${#temporals.format(l.startDate,'dd MMM yyyy')}"></td>
<td th:text="${#temporals.format(l.endDate,'dd MMM yyyy')}"></td>
<td th:text="${l.status}"></td>
</tr>

</tbody>

</table>

</div>

</div>

</main>

</div>

<script th:src="@{/js/components.js}"></script>
<script th:src="@{/js/app.js}"></script>

</body>
</html>
