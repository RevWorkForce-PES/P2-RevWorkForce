<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="user-fullname" th:content="${fullName} ?: 'Admin'">
<meta name="user-role" content="Admin">

<title>Admin Dashboard - RevWorkForce</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

<!-- Font Awesome -->
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.stats-grid {
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
	gap: 1.5rem;
	margin-bottom: 2rem;
}

.stat-card {
	display: flex;
	align-items: center;
	gap: 1.5rem;
}

.stat-icon {
	width: 60px;
	height: 60px;
	border-radius: 50%;
	background: rgba(255, 140, 0, 0.1);
	color: var(--primary);
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 1.5rem;
}

.stat-info h3 {
	font-size: 1.8rem;
	margin-bottom: 0.2rem;
}

.stat-info p {
	color: var(--text-muted);
	font-size: 0.9rem;
	margin-bottom: 0;
}

/* Dashboard Switcher */
#dashboardSwitcher:hover {
	background: rgba(255, 140, 0, 0.05);
	border-color: var(--primary);
	transform: translateY(-2px);
	box-shadow: 0 4px 12px rgba(255, 140, 0, 0.15);
}

.dashboard-option:hover {
	background: var(--bg-main);
	border-left-color: var(--primary) !important;
}

.dashboard-option.active {
	background: rgba(255, 140, 0, 0.08);
	border-left-color: var(--primary) !important;
}

.dashboard-option i {
	font-size: 1.4rem;
	width: 24px;
	text-align: center;
}
</style>

</head>

<body>

	<div class="app-container">

		<app-sidebar></app-sidebar>

		<main class="main-content">

			<app-navbar page-title="Admin Dashboard"></app-navbar>

			<!-- Header -->

			<div class="page-header"
				style="display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2rem; background: white; border-bottom: 1px solid var(--border-color);">

				<div>
					<h1 style="font-size: 1.5rem; margin: 0; color: var(--text-dark);">
						Admin Dashboard</h1>

					<p
						style="color: var(--text-muted); margin: 0.25rem 0 0 0; font-size: 0.9rem;">
						Full system access and management</p>
				</div>

				<!-- Dashboard Switcher -->

				<div th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
					style="position: relative;">

					<button id="dashboardSwitcher"
						style="background: var(--bg-glass); border: 1px solid var(--border-color); padding: 0.65rem 1.25rem; border-radius: var(--border-radius-sm); cursor: pointer; display: flex; align-items: center; gap: 0.75rem; font-size: 0.9rem; color: var(--text-dark); transition: all 0.3s; font-weight: 500;">

						<i class="fas fa-chart-line"></i> <span>Switch Dashboard</span> <i
							class="fas fa-chevron-down"></i>

					</button>

					<div id="dashboardMenu"
						style="position: absolute; top: calc(100% + 0.5rem); right: 0; background: white; border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); min-width: 240px; display: none; z-index: 1000; overflow: hidden;">

						<a th:href="@{/admin/dashboard}" class="dashboard-option active"
							style="display: flex; align-items: center; gap: 1rem; padding: 1rem; text-decoration: none; color: var(--text-dark);">

							<i class="fas fa-user-shield"></i>

							<div>
								<div style="font-weight: 600; font-size: 0.9rem;">Admin
									Dashboard</div>
								<div style="font-size: 0.75rem; color: var(--text-muted);">Full
									system access</div>
							</div>

						</a> <a th:href="@{/manager/dashboard}" class="dashboard-option"
							style="display: flex; align-items: center; gap: 1rem; padding: 1rem; text-decoration: none; color: var(--text-dark);">

							<i class="fas fa-user-tie"></i>

							<div>
								<div style="font-weight: 600; font-size: 0.9rem;">Manager
									Dashboard</div>
								<div style="font-size: 0.75rem; color: var(--text-muted);">Team
									management view</div>
							</div>

						</a> <a th:href="@{/employee/dashboard}" class="dashboard-option"
							style="display: flex; align-items: center; gap: 1rem; padding: 1rem; text-decoration: none; color: var(--text-dark);">

							<i class="fas fa-briefcase"></i>

							<div>
								<div style="font-weight: 600; font-size: 0.9rem;">Employee
									Dashboard</div>
								<div style="font-size: 0.75rem; color: var(--text-muted);">Personal
									workspace</div>
							</div>

						</a>

					</div>

				</div>

			</div>

			<!-- Stats -->

			<div class="page-wrapper">

				<div class="stats-grid">

					<div class="card stat-card">
						<div class="stat-icon">
							<i class="fas fa-users"></i>
						</div>
						<div class="stat-info">
							<h3 th:text="${totalEmployees}">0</h3>
							<p>Total Employees</p>
						</div>
					</div>

					<div class="card stat-card">
						<div class="stat-icon">
							<i class="fas fa-building"></i>
						</div>
						<div class="stat-info">
							<h3 th:text="${totalDepartments}">0</h3>
							<p>Departments</p>
						</div>
					</div>

					<div class="card stat-card">
						<div class="stat-icon">
							<i class="fas fa-user-check"></i>
						</div>
						<div class="stat-info">
							<h3 th:text="${activeEmployees}">0</h3>
							<p>Active Employees</p>
						</div>
					</div>

					<div class="card stat-card">
						<div class="stat-icon"
							style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
							<i class="fas fa-check-circle"></i>
						</div>
						<div class="stat-info">
							<h3>98%</h3>
							<p>System Health</p>
						</div>
					</div>

				</div>
<!-- Reports Section -->
    <div class="card" style="margin-top:2rem;">

        <h2 style="margin-bottom:1rem;">Reports</h2>

        <div style="display:flex;gap:1rem;flex-wrap:wrap;">

            <a th:href="@{/admin/reports/employee}"
               class="btn btn-primary"
               style="display:flex;align-items:center;gap:0.5rem;">
                <i class="fas fa-user"></i>
                Employee Leave Report
            </a>

            <a th:href="@{/admin/reports/department}"
               class="btn btn-primary"
               style="display:flex;align-items:center;gap:0.5rem;">
                <i class="fas fa-building"></i>
                Department Leave Report
            </a>

        </div>

    </div>

</div>

		</main>

	</div>

	<script th:src="@{/js/components.js}"></script>
	<script th:src="@{/js/app.js}"></script>

	<script>
		document
				.addEventListener(
						'DOMContentLoaded',
						function() {

							const btn = document
									.getElementById('dashboardSwitcher');
							const menu = document
									.getElementById('dashboardMenu');

							if (btn && menu) {

								btn
										.addEventListener(
												'click',
												function(e) {
													e.stopPropagation();
													menu.style.display = menu.style.display === 'block' ? 'none'
															: 'block';
												});

								document.addEventListener('click', function() {
									menu.style.display = 'none';
								});

								menu.addEventListener('click', function(e) {
									e.stopPropagation();
								});

							}

						});
	</script>

</body>
</html>
