<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="global-user-fullname" th:content="${globalFullName}">
	<meta name="global-user-role" th:content="${globalUserRole}">
	<meta name="user-fullname" th:content="${fullName} ?: 'Admin'">
	<meta name="user-role" content="Admin">
	<title>Admin Dashboard - RevWorkForce</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<style>
		.stats-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
			gap: 1.5rem;
			margin-bottom: 2rem;
		}



		.stat-card {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			text-align: center;
			gap: 1rem;
			padding: 2rem !important;
		}

		.stat-icon {
			width: 60px;
			height: 60px;
			border-radius: 50%;
			background: rgba(255, 140, 0, 0.1);
			color: var(--primary);
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 1.5rem;
		}

		.stat-info h3 {
			font-size: 1.8rem;
			margin-bottom: 0.2rem;
		}

		.stat-info p {
			color: var(--text-muted);
			font-size: 0.9rem;
			margin-bottom: 0;
		}

		/* Dashboard Switcher */
		#dashboardSwitcher:hover {
			background: rgba(255, 140, 0, 0.05);
			border-color: var(--primary);
			transform: translateY(-2px);
			box-shadow: 0 4px 12px rgba(255, 140, 0, 0.15);
		}

		.dashboard-option:hover {
			background: rgba(0, 0, 0, 0.8);
			border-left-color: #000 !important;
			color: white !important;
		}

		.dashboard-option.active {
			background: #222;
			border-left-color: #000 !important;
			color: white !important;
		}

		.dashboard-option i {
			font-size: 1.4rem;
			width: 24px;
			text-align: center;
		}
	</style>

</head>

<body>

	<div class="app-container">

		<app-sidebar></app-sidebar>

		<main class="main-content">

			<app-navbar page-title="Admin Dashboard"></app-navbar>

			<!-- Stats -->

			<div class="page-wrapper">

				<div class="stats-grid">

					<div class="card stat-card">
						<div class="stat-icon">
							<i class="fas fa-users"></i>
						</div>
						<div class="stat-info">
							<h3 th:text="${totalEmployees}">0</h3>
							<p>Total Employees</p>
						</div>
					</div>

					<div class="card stat-card">
						<div class="stat-icon">
							<i class="fas fa-building"></i>
						</div>
						<div class="stat-info">
							<h3 th:text="${totalDepartments}">0</h3>
							<p>Departments</p>
						</div>
					</div>

					<div class="card stat-card">
						<div class="stat-icon">
							<i class="fas fa-user-check"></i>
						</div>
						<div class="stat-info">
							<h3 th:text="${activeEmployees}">0</h3>
							<p>Active Employees</p>
						</div>
					</div>

					<div class="card stat-card">
						<div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
							<i class="fas fa-check-circle"></i>
						</div>
						<div class="stat-info">
							<h3>98%</h3>
							<p>System Health</p>
						</div>
					</div>

				</div>
				<!-- Reports Section -->
				<div class="card" style="margin-top:2rem;">

					<h2 style="margin-bottom:1rem;">Reports</h2>

					<div style="display:flex;gap:1rem;flex-wrap:wrap;">

						<a th:href="@{/admin/reports/employee}" class="btn btn-primary"
							style="display:flex;align-items:center;gap:0.5rem;">
							<i class="fas fa-user"></i>
							Employee Leave Report
						</a>

						<a th:href="@{/admin/reports/department}" class="btn btn-primary"
							style="display:flex;align-items:center;gap:0.5rem;">
							<i class="fas fa-building"></i>
							Department Leave Report
						</a>

					</div>

				</div>

			</div>

		</main>

	</div>

	<script th:src="@{/js/components.js}"></script>
	<script th:src="@{/js/app.js}"></script>

	<script>
		// Page specific scripts can go here
	</script>

</body>

</html>
