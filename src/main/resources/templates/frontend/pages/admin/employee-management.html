<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management - RevWorkForce Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <app-sidebar></app-sidebar>
        <main class="main-content">
            <app-navbar page-title="Employee Management"></app-navbar>
            <div class="page-wrapper">
                <div class="card">
                    <div class="tabs">
                        <button class="tab-btn active" data-target="search-employees">Search & List</button>
                        <button class="tab-btn" data-target="add-employee">Add New Employee</button>
                    </div>

                    <!-- Search & List Tab -->
                    <div id="search-employees" class="tab-content active">
                        <!-- Success/Error flash messages -->
                        <div th:if="${success}"
                            style="margin-bottom:1rem; padding:0.75rem 1rem; background:#d4edda; border-radius:4px; color:#155724;">
                            <i class="fas fa-check-circle"></i> <span th:text="${success}">Success</span>
                        </div>
                        <div th:if="${error}"
                            style="margin-bottom:1rem; padding:0.75rem 1rem; background:#f8d7da; border-radius:4px; color:#721c24;">
                            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
                        </div>

                        <!-- UPDATED FILTERS: Department & Designation instead of Status -->
                        <form th:action="@{/admin/employees}" method="get" class="flex-space-between mb-3">
                            <div class="form-group" style="margin-bottom: 0; width: 350px;">
                                <input type="text" name="keyword" class="form-control"
                                    placeholder="Search by ID, Name or Email..."
                                    th:value="${criteria != null ? criteria.keyword : ''}">
                            </div>
                            <div style="display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap;">
                                <!-- Department Filter -->
                                <select name="departmentId" class="form-control" style="width:160px;">
                                    <option value="">All Departments</option>
                                    <option th:each="dept : ${departments}" 
                                            th:value="${dept.departmentId}" 
                                            th:text="${dept.departmentName}"
                                            th:selected="${criteria != null && criteria.departmentId == dept.departmentId}">
                                    </option>
                                </select>
                                
                                <!-- Designation Filter -->
                                <select name="designationId" class="form-control" style="width:160px;">
                                    <option value="">All Designations</option>
                                    <option th:each="desig : ${designations}" 
                                            th:value="${desig.designationId}" 
                                            th:text="${desig.designationName}"
                                            th:selected="${criteria != null && criteria.designationId == desig.designationId}">
                                    </option>
                                </select>
                                
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-search"></i> Search
                                </button>
                                
                                <!-- Clear Filters Button -->
                                <a th:href="@{/admin/employees}" class="btn btn-secondary">
                                    <i class="fas fa-times"></i> Clear
                                </a>
                            </div>
                        </form>
                        
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Department</th>
                                        <th>Designation</th>
                                        <th>Status</th>
                                        <th style="width: 280px;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="emp : ${employees}">
                                        <td th:text="${emp.employeeId}">EMP001</td>
                                        <td th:text="${emp.firstName + ' ' + emp.lastName}">Alice Smith</td>
                                        <td th:text="${emp.departmentName != null ? emp.departmentName : 'N/A'}">
                                            Engineering</td>
                                        <td th:text="${emp.designationName != null ? emp.designationName : 'N/A'}">
                                            Software Eng</td>
                                        <td>
                                            <span class="badge"
                                                th:classappend="${emp.status != null && emp.status.name() == 'ACTIVE' ? 'badge-approved' : 'badge-rejected'}"
                                                th:text="${emp.status}">Active</span>
                                        </td>
                                        <td style="display:flex; gap:0.3rem; flex-wrap:wrap;">
                                            <!-- Edit Button -->
                                            <a th:href="@{/admin/employees/edit/{id}(id=${emp.employeeId})}"
                                                class="btn btn-secondary btn-sm">
                                                <i class="fas fa-edit"></i> Edit
                                            </a>
                                            
                                            <!-- View Button -->
                                            <a th:href="@{/admin/employees/view/{id}(id=${emp.employeeId})}"
                                                class="btn btn-secondary btn-sm">
                                                <i class="fas fa-eye"></i> View
                                            </a>
                                            
                                            <!-- DEACTIVATE BUTTON (only for ACTIVE employees) -->
                                            <form th:if="${emp.status != null && emp.status.name() == 'ACTIVE'}"
                                                  th:action="@{/admin/employees/deactivate/{id}(id=${emp.employeeId})}"
                                                  method="POST" style="display:inline;">
                                                <button type="submit" class="btn btn-danger btn-sm"
                                                    onclick="return confirm('Deactivate this employee?')">
                                                    <i class="fas fa-user-slash"></i> Deactivate
                                                </button>
                                            </form>
                                            
                                            <!-- REACTIVATE BUTTON (only for INACTIVE employees) -->
                                            <form th:if="${emp.status != null && emp.status.name() != 'ACTIVE'}"
                                                  th:action="@{/admin/employees/reactivate/{id}(id=${emp.employeeId})}"
                                                  method="POST" style="display:inline;">
                                                <button type="submit" class="btn btn-success btn-sm"
                                                    onclick="return confirm('Reactivate this employee?')">
                                                    <i class="fas fa-user-check"></i> Reactivate
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(employees)}">
                                        <td colspan="6" class="text-center text-muted">No employees found</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="mt-3 text-center text-muted"
                            th:text="${'Showing ' + employees.size() + ' employees'}">Showing 0 employees</div>
                    </div>

                    <!-- Add Employee Tab - redirects to dedicated page -->
                    <div id="add-employee" class="tab-content">
                        <div style="text-align:center; padding: 3rem;">
                            <i class="fas fa-user-plus"
                                style="font-size:3rem; color:var(--primary); margin-bottom:1rem; display:block;"></i>
                            <h3 class="mb-2">Add New Employee</h3>
                            <p class="text-muted mb-3">Fill in all required details to create a new employee profile.
                            </p>
                            <a th:href="@{/admin/employees/add}" class="btn btn-primary">
                                <i class="fas fa-plus"></i> Open Add Employee Form
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <!-- Load Scripts -->
    <script th:src="@{/js/components.js}"></script>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
