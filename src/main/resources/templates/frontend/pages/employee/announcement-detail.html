<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle + ' - RevWorkForce'}">Announcement - RevWorkForce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-container">
        <app-sidebar></app-sidebar>
        <main class="main-content">
            <app-navbar th:attr="page-title=${pageTitle}"></app-navbar>
            <div class="page-wrapper">
                <div class="card" style="max-width: 800px;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                        <a th:href="@{/employee/announcements}" class="btn btn-secondary btn-sm">
                            <i class="fas fa-arrow-left"></i> Back to Announcements
                        </a>
                        <span class="badge"
                            th:classappend="${announcement.priority != null && announcement.priority.name() == 'HIGH' ? 'badge-rejected' : (announcement.priority != null && announcement.priority.name() == 'MEDIUM' ? 'badge-pending' : 'badge-approved')}"
                            th:text="${announcement.priority != null ? announcement.priority : 'NORMAL'}">NORMAL</span>
                    </div>

                    <h2 th:text="${announcement.title}" style="margin-bottom: 0.5rem;">Announcement Title</h2>
                    <p class="text-muted" style="font-size: 0.85rem; margin-bottom: 1.5rem;">
                        <i class="fas fa-calendar-alt"></i>
                        Published:
                        <span
                            th:text="${announcement.publishDate != null ? #temporals.format(announcement.publishDate, 'MMMM d, yyyy') : 'N/A'}">March
                            1, 2026</span>
                        <span th:if="${announcement.expiryDate != null}">
                            &nbsp;·&nbsp; Expires:
                            <span th:text="${#temporals.format(announcement.expiryDate, 'MMMM d, yyyy')}">March 31,
                                2026</span>
                        </span>
                    </p>

                    <div style="line-height: 1.75; color: var(--text-dark);" th:text="${announcement.message}">
                        Announcement body text goes here.
                    </div>
                </div>
            </div>
        </main>
    </div>
    <!-- Load Scripts -->
    <script th:src="@{/js/components.js}"></script>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
