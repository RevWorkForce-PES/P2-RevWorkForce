<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="global-user-fullname" th:content="${globalFullName}">
    <meta name="global-user-role" th:content="${globalUserRole}">
    <title>Performance Review Details - RevWorkForce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-container">
        <app-sidebar></app-sidebar>
        <main class="main-content">
            <app-navbar th:attr="page-title='Performance Review: ' + ${review.reviewYear}"></app-navbar>
            <div class="page-wrapper">
                <div class="card" style="max-width: 900px; margin: 0 auto;">
                    <div class="flex-space-between mb-4">
                        <h2 style="margin: 0;"><i class="fas fa-file-alt"></i> Detailed Assessment</h2>
                        <a th:href="@{/employee/performance}" class="btn btn-secondary btn-sm">
                            <i class="fas fa-arrow-left"></i> Back to Dashboard
                        </a>
                    </div>

                    <div class="mb-4 p-3"
                        style="background:#f8fafc; border-radius:8px; border:1px solid var(--border-color); display:flex; justify-content:space-around; text-align:center;">
                        <div>
                            <p class="text-muted small text-uppercase mb-1">Status</p>
                            <span class="badge"
                                th:classappend="${review.status.name() == 'REVIEWED' ? 'badge-approved' : 'badge-pending'}"
                                th:text="${review.status}">Status</span>
                        </div>
                        <div>
                            <p class="text-muted small text-uppercase mb-1">Self Rating</p>
                            <h3 th:text="${review.selfAssessmentRating} + ' / 5.0'" style="margin:0;">4.0 / 5.0</h3>
                        </div>
                        <div th:if="${review.managerRating != null}">
                            <p class="text-muted small text-uppercase mb-1">Manager Rating</p>
                            <h3 th:text="${review.managerRating} + ' / 5.0'" style="margin:0; color:var(--primary);">4.5
                                / 5.0</h3>
                        </div>
                        <div th:if="${review.finalRating != null}">
                            <p class="text-muted small text-uppercase mb-1">Final Combined Rating</p>
                            <h3 th:text="${review.finalRating} + ' / 5.0'" style="margin:0; font-weight:bold;">4.25 /
                                5.0</h3>
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <!-- Left: Employee Self Assessment -->
                        <div>
                            <h4 class="mb-3"><i class="fas fa-user"></i> Self-Assessment</h4>
                            <div class="mb-4">
                                <label class="font-weight-bold small text-muted text-uppercase">Key Deliverables</label>
                                <p th:text="${review.keyDeliverables}" style="white-space: pre-wrap;"></p>
                            </div>
                            <div class="mb-4">
                                <label class="font-weight-bold small text-muted text-uppercase">Accomplishments</label>
                                <p th:text="${review.majorAccomplishments}" style="white-space: pre-wrap;"></p>
                            </div>
                            <div class="mb-4">
                                <label class="font-weight-bold small text-muted text-uppercase">Improvement
                                    Areas</label>
                                <p th:text="${review.areasOfImprovement}" style="white-space: pre-wrap;"></p>
                            </div>
                        </div>

                        <!-- Right: Manager Review -->
                        <div style="border-left: 1px solid var(--border-color); padding-left: 2rem;">
                            <h4 class="mb-3"><i class="fas fa-user-tie"></i> Manager Feedback</h4>
                            <div th:if="${review.managerFeedback != null}">
                                <div class="mb-4">
                                    <label class="font-weight-bold small text-muted text-uppercase">Feedback</label>
                                    <p th:text="${review.managerFeedback}"
                                        style="white-space: pre-wrap; line-height:1.6;"></p>
                                </div>
                                <div class="mb-4" th:if="${review.reviewedDate != null}">
                                    <label class="font-weight-bold small text-muted text-uppercase">Reviewed On</label>
                                    <p th:text="${#temporals.format(review.reviewedDate, 'MMM dd, yyyy')}"></p>
                                </div>
                            </div>
                            <div th:if="${review.managerFeedback == null}" class="text-center p-5 text-muted">
                                <i class="fas fa-clock fa-3x mb-3"></i>
                                <p>Waiting for manager's review phase to complete.</p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-5 text-center" th:if="${review.status.name() == 'REVIEWED'}">
                        <button class="btn btn-secondary" onclick="window.print()"><i class="fas fa-print"></i> Print
                            official Performance Document</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/components.js}"></script>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
