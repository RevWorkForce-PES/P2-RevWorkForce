<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/header :: head}"></head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="fas fa-bell me-2"></i>All Notifications</h3>

    <form th:if="${not #lists.isEmpty(notifications)}"
          th:action="@{/notifications/mark-all-read}"
          method="post">

        <!-- CSRF token -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <button type="submit" class="btn btn-outline-primary btn-sm">
            <i class="fas fa-check-double me-1"></i>Mark All as Read
        </button>

    </form>
</div>

        <div class="card shadow-sm">
            <div class="card-body">

                <div th:if="${#lists.isEmpty(notifications)}" class="alert alert-info">
                    No notifications available.
                </div>

                <div th:each="n : ${notifications}" class="mb-3 p-3 border rounded"
                    th:classappend="${n.isRead == 'N' ? 'bg-light' : ''}">

                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <strong th:text="${n.title}">Title</strong>
                            <span th:if="${n.isRead == 'N'}" class="badge bg-primary ms-2">New</span>
                        </div>

                        <div th:if="${n.isRead == 'N'}">
                            <form th:action="@{'/notifications/mark-read/' + ${n.notificationId}}" method="post">
                                <button type="submit" class="btn btn-link text-success p-0" title="Mark as read">
                                    <i class="fas fa-check-circle fa-lg"></i>
                                </button>
                            </form>
                        </div>
                    </div>

                    <p class="mb-1 text-muted mt-2" th:text="${n.message}">
                        Message
                    </p>

                    <small class="text-secondary" th:text="${#temporals.format(n.createdAt,'dd MMM yyyy HH:mm')}">
                    </small>

                </div>

            </div>
        </div>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/footer :: scripts}"></div>

</body>

</html>
