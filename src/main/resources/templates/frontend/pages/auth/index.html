<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RevWorkForce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .login-page {
            min-height: 100vh;
            display: flex;
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        .video-sidebar {
            width: 40%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        .video-sidebar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .login-content {
            width: 60%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            /* Align card to the right */
            justify-content: center;
            padding-right: 10%;
            /* Margin on the right side */
            position: relative;
            background: #fff;
        }

        @media (max-width: 768px) {
            .video-sidebar {
                display: none;
            }

            .login-content {
                width: 100%;
                align-items: center;
                padding-right: 2rem;
                padding-left: 2rem;
            }
        }

        .login-card {
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            border-radius: 0;
            padding: 1.5rem;
            width: 100%;
            max-width: 380px;
            /* Smaller form */
            box-shadow: none;
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 4rem;
        }

        .login-logo {
            width: auto;
            max-width: 120px;
            height: clamp(80px, 12vh, 120px);
            margin: 0 auto 1rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-logo img {
            width: auto;
            height: 100%;
            object-fit: contain;
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            font-size: 1.2rem;
            transition: color var(--transition-speed);
        }

        .password-toggle:hover {
            color: var(--text-dark);
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            margin-top: 1rem;
            border-radius: var(--border-radius-sm);
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            color: var(--primary);
            margin-top: 0.5rem;
            transition: color var(--transition-speed);
        }

        .forgot-password:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        /* Demo credentials section */
        .demo-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .demo-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .demo-instruction {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .credentials-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.25rem;
        }

        .credential-box {
            background: rgba(var(--primary-rgb), 0.05);
            border: 1px solid rgba(var(--primary-rgb), 0.1);
            border-radius: var(--border-radius-sm);
            padding: 0.5rem 0.75rem;
            text-align: left;
            cursor: pointer;
            transition: all var(--transition-speed);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            /* added shadow */
        }

        .credential-box:hover {
            background: rgba(var(--primary-rgb), 0.1);
            border-color: rgba(var(--primary-rgb), 0.2);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .credential-role {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .credential-info {
            font-size: 0.8rem;
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            display: flex;
            /* inline for ID and Password */
            gap: 2.5rem;
        }

        .credential-info div {
            margin-bottom: 0;
        }

        .credential-info span {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        /* Enhanced Quick Login Modal */
        .quick-login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2001;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .quick-login-modal {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius-lg);
            padding: 2.5rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .quick-login-overlay.active {
            display: flex;
            opacity: 1;
        }

        .quick-login-overlay.active .quick-login-modal {
            transform: scale(1);
        }

        .role-btn {
            width: 100%;
            padding: 1rem;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            transition: all 0.2s ease;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .role-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            filter: brightness(1.1);
        }

        .role-btn:active {
            transform: translateY(-1px);
        }

        .role-btn i {
            font-size: 1.25rem;
        }

        .role-btn.admin {
            background: linear-gradient(135deg, #1e293b, #334155);
        }

        .role-btn.manager {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .role-btn.employee {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .close-modal-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .close-modal-btn:hover {
            color: var(--text-dark);
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="video-sidebar">
            <img th:src="@{/assets/side.png}" alt="Side Image">
        </div>
        <div class="login-content">
            <div class="login-card" id="loginCard">
                <div id="formContent">
                    <div class="login-logo">
                        <img th:src="@{/assets/logo.PNG}" alt="RevWorkForce Logo">
                    </div>
                    <h1 class="login-title">Welcome Back</h1>
                    <p class="login-subtitle">Sign in to RevWorkForce</p>

                    <div th:if="${error}" class="alert alert-danger"
                        style="color: #dc3545; background-color: #f8d7da; border-color: #f5c6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem; text-align: left;"
                        th:text="${error}"></div>
                    <div th:if="${message}" class="alert alert-success"
                        style="color: #155724; background-color: #d4edda; border-color: #c3e6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem; text-align: left;"
                        th:text="${message}"></div>
                    <div th:if="${success}" class="alert alert-success"
                        style="color: #155724; background-color: #d4edda; border-color: #c3e6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem; text-align: left;"
                        th:text="${success}"></div>

                    <form id="loginForm" th:action="@{/login}" method="post">
                        <div class="form-group">
                            <label class="form-label" for="username">Employee ID / Email</label>
                            <input type="text" id="username" name="username" class="form-control"
                                placeholder="e.g. EMP001" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password">Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="password" name="password" class="form-control"
                                    placeholder="Enter your password" required style="padding-right: 40px;">
                                <button type="button" class="password-toggle" id="togglePassword">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                            <a th:href="@{/forgot-password}" class="forgot-password">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary btn-login">Sign In</button>

                        <!-- Quick Login Icon -->
                        <div style="text-align: center; margin-top: 1rem;">
                            <button type="button" id="quickLoginBtn" class="btn btn-secondary"
                                style="border: none; background: transparent; color: var(--text-muted); font-size: 1.25rem;">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- Quick Login Modal -->
    <div id="quickLoginModal" class="quick-login-overlay">
        <div class="quick-login-modal">
            <button id="closeQuickLoginBtn" class="close-modal-btn">
                <i class="fa-solid fa-times"></i>
            </button>
            <h3 class="mb-2">Quick Access</h3>
            <p class="text-muted mb-4" style="font-size: 0.9rem;">Choose a role to auto-fill and login instantly.</p>

            <div class="role-buttons">
                <button type="button" class="role-btn admin" onclick="autoFillLogin('ADM001', 'password123')">
                    <i class="fa-solid fa-shield-halved"></i> Admin
                </button>
                <button type="button" class="role-btn manager" onclick="autoFillLogin('MGR001', 'password123')">
                    <i class="fa-solid fa-user-tie"></i> Manager
                </button>
                <button type="button" class="role-btn employee" onclick="autoFillLogin('EMP001', 'password123')">
                    <i class="fa-solid fa-user"></i> Employee
                </button>
            </div>
        </div>
    </div>


    <!-- Load App JS -->
    <script th:src="@{/js/app.js}"></script>
    <script th:inline="javascript">
        // Password toggle functionality
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);

                // Change icon
                this.innerHTML = type === 'password'
                    ? '<i class="fa-solid fa-eye"></i>'
                    : '<i class="fa-solid fa-eye-slash"></i>';
            });
        }

        // Dynamically set current year in footer (if exists)
        const yearElement = document.getElementById('currentYear');
        if (yearElement) {
            yearElement.textContent = new Date().getFullYear();
        }

        document.addEventListener("DOMContentLoaded", function () {
            // Quick Login Modal Logic
            const quickLoginBtn = document.getElementById('quickLoginBtn');
            const quickLoginModal = document.getElementById('quickLoginModal');
            const closeQuickLoginBtn = document.getElementById('closeQuickLoginBtn');

            if (quickLoginBtn && quickLoginModal) {
                quickLoginBtn.addEventListener('click', () => {
                    quickLoginModal.style.display = 'flex';
                    // Trigger reflow for transition
                    quickLoginModal.offsetHeight;
                    quickLoginModal.classList.add('active');
                });

                const closeModal = () => {
                    quickLoginModal.classList.remove('active');
                    setTimeout(() => {
                        quickLoginModal.style.display = 'none';
                    }, 300);
                };

                closeQuickLoginBtn.addEventListener('click', closeModal);

                // Close when clicking outside the modal content
                quickLoginModal.addEventListener('click', (e) => {
                    if (e.target === quickLoginModal) {
                        closeModal();
                    }
                });
            }

            // Global function for the buttons to call
            window.autoFillLogin = function (username, password) {
                const usernameField = document.getElementById('username');
                const passwordField = document.getElementById('password');
                const loginForm = document.getElementById('loginForm');

                // Fill fields with a typing effect feel (fast but visible)
                usernameField.value = username;
                passwordField.value = password;

                // Close the modal
                if (quickLoginModal) {
                    quickLoginModal.classList.remove('active');
                    setTimeout(() => {
                        quickLoginModal.style.display = 'none';
                    }, 300);
                }

                // Small delay before submission for visual confirmation
                setTimeout(() => {
                    // Provide a visual indication that submission is happening
                    const submitBtn = loginForm.querySelector('button[type="submit"]');
                    if (submitBtn) {
                        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
                        submitBtn.disabled = true;
                    }
                    loginForm.submit();
                }, 600);
            };
        });
    </script>
</body>

</html>
