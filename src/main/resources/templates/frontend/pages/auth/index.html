<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RevWorkForce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-main) 0%, #fff 100%);
            position: relative;
            overflow: hidden;
        }

        .login-page::before,
        .login-page::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            z-index: 0;
        }

        .login-page::before {
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
        }

        .login-page::after {
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 160, 122, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
        }

        .login-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--border-radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .login-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 10px 20px rgba(255, 140, 0, 0.3);
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            font-size: 1.2rem;
            transition: color var(--transition-speed);
        }

        .password-toggle:hover {
            color: var(--text-dark);
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            margin-top: 1rem;
            border-radius: var(--border-radius-sm);
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            color: var(--primary);
            margin-top: 0.5rem;
            transition: color var(--transition-speed);
        }

        .forgot-password:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        /* Demo credentials section */
        .demo-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .demo-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .demo-instruction {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .credentials-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.25rem;
        }

        .credential-box {
            background: rgba(var(--primary-rgb), 0.05);
            border: 1px solid rgba(var(--primary-rgb), 0.1);
            border-radius: var(--border-radius-sm);
            padding: 0.5rem 0.75rem;
            text-align: left;
            cursor: pointer;
            transition: all var(--transition-speed);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            /* added shadow */
        }

        .credential-box:hover {
            background: rgba(var(--primary-rgb), 0.1);
            border-color: rgba(var(--primary-rgb), 0.2);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .credential-role {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .credential-info {
            font-size: 0.8rem;
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            display: flex;
            /* inline for ID and Password */
            gap: 2.5rem;
        }

        .credential-info div {
            margin-bottom: 0;
        }

        .credential-info span {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        #gifContainer {
            display: none;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        #gifContainer img {
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius-sm);
        }

        .login-card.gif-active {
            padding: 0;
            box-shadow: none;
            background: #fff;
            border: none;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div id="gifContainer">
                <img th:src="@{/assets/logo.gif}" alt="Loading..." class="img-fluid">
            </div>

            <div id="formContent">
                <div class="login-logo">R</div>
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Sign in to RevWorkForce</p>

                <div th:if="${error}" class="alert alert-danger"
                    style="color: #dc3545; background-color: #f8d7da; border-color: #f5c6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem; text-align: left;"
                    th:text="${error}"></div>
                <div th:if="${message}" class="alert alert-success"
                    style="color: #155724; background-color: #d4edda; border-color: #c3e6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem; text-align: left;"
                    th:text="${message}"></div>
                <div th:if="${success}" class="alert alert-success"
                    style="color: #155724; background-color: #d4edda; border-color: #c3e6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem; text-align: left;"
                    th:text="${success}"></div>

                <form id="loginForm" th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label class="form-label" for="username">Employee ID / Email</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="e.g. EMP001"
                            required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" class="form-control"
                                placeholder="Enter your password" required style="padding-right: 40px;">
                            <button type="button" class="password-toggle" id="togglePassword">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <a th:href="@{/forgot-password}" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-login">Sign In</button>
                </form>

                <!-- Demo Credentials Section -->
                <div class="demo-section">
                    <p class="demo-title">Demo Credentials</p>
                    <p class="demo-instruction">Click to auto-fill Credentials</p>

                    <div class="credentials-grid">
                        <!-- Admin -->
                        <div class="credential-box" onclick="fillCredentials('ADM001', 'password123')">
                            <div class="credential-role"><i class="fa-solid fa-user-shield"></i> Admin</div>
                            <div class="credential-info">
                                <div><span>ID:</span> ADM001</div>
                                <div><span>Password:</span> password123</div>
                            </div>
                        </div>

                        <!-- Manager -->
                        <div class="credential-box" onclick="fillCredentials('MGR001', 'password123')">
                            <div class="credential-role"><i class="fa-solid fa-user-tie"></i> Manager</div>
                            <div class="credential-info">
                                <div><span>ID:</span> MGR001</div>
                                <div><span>Password:</span> password123</div>
                            </div>
                        </div>

                        <!-- Employee -->
                        <div class="credential-box" onclick="fillCredentials('EMP001', 'password123')">
                            <div class="credential-role"><i class="fa-solid fa-briefcase"></i> Employee</div>
                            <div class="credential-info">
                                <div><span>ID:</span> EMP001</div>
                                <div><span>Password:</span> password123</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dynamic Footer -->
    <footer style="
    text-align: center; 
    padding: 1.5rem 0; 
    color: var(--text-muted); 
    font-size: 0.8rem; 
    margin-top: 2rem;
">
        &copy; <span id="currentYear"></span> RevWorkForce. All rights reserved.
    </footer>


    <!-- Load App JS -->
    <script th:src="@{/js/app.js}"></script>
    <script>
        // Password toggle functionality
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            // Change icon
            this.innerHTML = type === 'password'
                ? '<i class="fa-solid fa-eye"></i>'
                : '<i class="fa-solid fa-eye-slash"></i>';
        });

        // Fill credentials function
        function fillCredentials(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
        }

        // Dynamically set current year in footer
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // Handle Form Submission with GIF Transition
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault(); // Prevent immediate submission

            const formContent = document.getElementById('formContent');
            const gifContainer = document.getElementById('gifContainer');
            const loginCard = document.querySelector('.login-card');

            // Hide form and show GIF
            formContent.style.display = 'none';
            gifContainer.style.display = 'flex';

            // Apply minimalist style
            loginCard.classList.add('gif-active');

            // Wait for GIF to play fully (4.4 seconds) then submit
            setTimeout(() => {
                this.submit();
            }, 4400);
        });

    </script>
</body>

</html>
