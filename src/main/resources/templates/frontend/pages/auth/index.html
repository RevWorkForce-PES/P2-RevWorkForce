<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RevWorkForce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-main) 0%, #fff 100%);
            position: relative;
            overflow: hidden;
        }

        .login-page::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: 0;
        }

        .login-page::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 160, 122, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: 0;
        }

        .login-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--border-radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .login-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 10px 20px rgba(255, 140, 0, 0.3);
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            margin-top: 1rem;
            border-radius: var(--border-radius-sm);
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            color: var(--primary);
            margin-top: 0.5rem;
            transition: color var(--transition-speed);
        }

        .forgot-password:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        /* Role selector for demo purposes */
        .demo-roles {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .demo-roles p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .demo-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        .btn-demo {
            flex: 1;
            padding: 0.4rem;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">R</div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to RevWorkForce</p>

            <div th:if="${error}" class="alert alert-danger"
                style="color: #dc3545; background-color: #f8d7da; border-color: #f5c6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem; text-align: left;"
                th:text="${error}"></div>
            <div th:if="${message}" class="alert alert-success"
                style="color: #155724; background-color: #d4edda; border-color: #c3e6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem; text-align: left;"
                th:text="${message}"></div>

            <form id="loginForm" th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">Employee ID / Email</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="e.g. EMP001"
                        required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Enter your password" required>
                    <a th:href="@{/forgot-password}" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-login">Sign In</button>
            </form>

            <div class="demo-roles">
                <p>Quick Login Demo</p>
                <div class="demo-buttons">
                    <button class="btn btn-secondary btn-demo" onclick="mockLogin('admin')">Admin</button>
                    <button class="btn btn-secondary btn-demo" onclick="mockLogin('manager')">Manager</button>
                    <button class="btn btn-secondary btn-demo" onclick="mockLogin('employee')">Employee</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Load App JS -->
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
