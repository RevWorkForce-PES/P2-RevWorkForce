<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="global-user-fullname" th:content="${globalFullName}">
    <meta name="global-user-role" th:content="${globalUserRole}">
    <title>Account Settings - RevWorkForce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .settings-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .settings-layout {
                grid-template-columns: 1fr;
            }
        }

        .settings-nav {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 1rem 0;
            box-shadow: var(--shadow-sm);
        }

        .settings-nav-item {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            color: var(--text-dark);
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .settings-nav-item:hover,
        .settings-nav-item.active {
            background: rgba(255, 140, 0, 0.05);
            color: var(--primary-dark);
            border-left-color: var(--primary);
            font-weight: 500;
        }

        .settings-panel {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            display: none;
        }

        .settings-panel.active {
            display: block;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <app-sidebar></app-sidebar>
        <main class="main-content">
            <app-navbar page-title="Settings"></app-navbar>
            <div class="page-wrapper">
                <div class="settings-layout">
                    <!-- Left Sidebar for Settings Navigation -->
                    <div class="settings-nav">
                        <div class="settings-nav-item active" onclick="switchSettingTab('general')">General</div>
                        <div class="settings-nav-item" onclick="switchSettingTab('notifications')">Notifications</div>
                        <div class="settings-nav-item" id="adminSettingsNav" style="display: none;"
                            onclick="switchSettingTab('admin-sys')">System Config (Admin)</div>
                    </div>

                    <!-- Right Content Area -->
                    <div>
                        <!-- General Settings -->
                        <div id="general" class="settings-panel active">
                            <h2 class="mb-4">General Settings</h2>
                            <form onsubmit="event.preventDefault(); alert('Settings Saved!');">
                                <div class="form-group" style="max-width: 400px; margin-bottom: 1.5rem;">
                                    <label class="form-label">Display Language</label>
                                    <select class="form-control">
                                        <option>English (US)</option>
                                        <option>Spanish</option>
                                        <option>French</option>
                                    </select>
                                </div>
                                <div class="form-group" style="max-width: 400px; margin-bottom: 1.5rem;">
                                    <label class="form-label">Timezone</label>
                                    <select class="form-control">
                                        <option>(UTC-05:00) Eastern Time</option>
                                        <option>(UTC-08:00) Pacific Time</option>
                                        <option>(UTC+00:00) GMT</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-primary mt-3">Save Preferences</button>
                            </form>
                        </div>

                        <!-- Notification Settings -->
                        <div id="notifications" class="settings-panel">
                            <h2 class="mb-4">Notification Preferences</h2>

                            <div style="display: flex; flex-direction: column; gap: 1rem;">
                                <label style="display: flex; align-items: center; gap: 0.5rem;">
                                    <input type="checkbox" checked> Receive Email Alerts for Leave Approvals
                                </label>
                                <label id="mgrNotifyToggle" style="display: none; align-items: center; gap: 0.5rem;">
                                    <input type="checkbox" checked> Receive Daily Team Digest
                                </label>
                                <label style="display: flex; align-items: center; gap: 0.5rem;">
                                    <input type="checkbox"> Receive Browser Push Notifications
                                </label>
                            </div>
                            <button class="btn btn-primary mt-4"
                                onclick="alert('Notification Preferences Saved!')">Update</button>
                        </div>

                        <!-- Admin Specific Settings -->
                        <div id="admin-sys" class="settings-panel">
                            <h2 class="mb-4">Advanced System Routing</h2>
                            <p class="text-muted">You are viewing this because of your Admin role.</p>
                            <a th:href="@{/admin/system-config}" class="btn btn-secondary">Go to Master System
                                Panel
                                <i class="fas fa-arrow-right"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script th:src="@{/js/components.js}"></script>
    <script th:src="@{/js/app.js}"></script>
    <script>
        // Role-based rendering logic for settings page
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('userRole') || 'employee';

            // Show Admin-specific settings tab if admin
            if (role === 'admin') {
                document.getElementById('adminSettingsNav').style.display = 'block';
            }

            // Show Manager-specific notification setting if manager or admin
            if (role === 'manager' || role === 'admin') {
                document.getElementById('mgrNotifyToggle').style.display = 'flex';
            }
        });

        // Simple tab switcher
        function switchSettingTab(tabId) {
            document.querySelectorAll('.settings-nav-item').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.settings-panel').forEach(panel => panel.classList.remove('active'));

            event.currentTarget.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }
    </script>
</body>

</html>
