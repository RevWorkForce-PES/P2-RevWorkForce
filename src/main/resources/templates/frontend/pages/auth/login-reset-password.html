<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - RevWorkForce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-main) 0%, #fff 100%);
            position: relative;
            overflow: hidden;
        }

        .login-page::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: 0;
        }

        .login-page::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 160, 122, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: 0;
        }

        .login-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--border-radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .login-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            transition: color var(--transition-speed);
        }

        .password-toggle:hover {
            color: var(--text-dark);
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 0.5rem;
            transition: all 0.3s;
            background: #e5e7eb;
        }

        .password-strength.weak {
            width: 33%;
            background: #ef4444;
        }

        .password-strength.medium {
            width: 66%;
            background: #f59e0b;
        }

        .password-strength.strong {
            width: 100%;
            background: #10b981;
        }

        .strength-text {
            font-size: 0.75rem;
            margin-top: 0.25rem;
            display: block;
        }

        .strength-text.weak {
            color: #ef4444;
        }

        .strength-text.medium {
            color: #f59e0b;
        }

        .strength-text.strong {
            color: #10b981;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            margin-top: 1rem;
            border-radius: var(--border-radius-sm);
        }

        .back-to-login {
            display: block;
            text-align: center;
            font-size: 0.9rem;
            color: var(--primary);
            margin-top: 1.5rem;
            transition: color var(--transition-speed);
        }

        .back-to-login:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .requirements-box {
            background: rgba(16, 185, 129, 0.1);
            border-left: 3px solid #10b981;
            padding: 1rem;
            border-radius: var(--border-radius-sm);
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .requirements-box h6 {
            margin: 0 0 0.5rem 0;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .requirements-box ul {
            margin: 0;
            padding-left: 1.25rem;
            font-size: 0.8rem;
            color: var(--text-dark);
        }

        .requirements-box li {
            margin-bottom: 0.25rem;
        }

        .match-error {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.25rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">✓</div>
            <h1 class="login-title">Reset Password</h1>
            <p class="login-subtitle">Create a new secure password</p>

            <!-- Success Badge -->
            <div style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 0.75rem; border-radius: var(--border-radius-sm); margin-bottom: 1.5rem; font-size: 0.9rem;">
                ✓ Identity Verified! You can now set a new password.
            </div>

            <!-- Error Message -->
            <div th:if="${error}" class="alert alert-danger"
                style="color: #dc3545; background-color: #f8d7da; border-color: #f5c6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem; text-align: left;"
                th:text="${error}"></div>

            <!-- Password Requirements -->
            <div class="requirements-box">
                <h6>Password Requirements:</h6>
                <ul>
                    <li>Minimum 8 characters</li>
                    <li>Include uppercase and lowercase letters</li>
                    <li>Include at least one number</li>
                    <li>Special characters recommended</li>
                </ul>
            </div>

            <!-- Form -->
            <form id="resetForm" th:action="@{/forgot-password/reset}" method="post">
                <!-- Hidden Email -->
                <input type="hidden" name="email" th:value="${email}">
                
                <!-- New Password -->
                <div class="form-group">
                    <label class="form-label" for="newPassword">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" 
                               id="newPassword" 
                               name="newPassword" 
                               class="form-control" 
                               placeholder="Enter new password"
                               required
                               minlength="8"
                               autofocus
                               style="padding-right: 40px;">
                        <button type="button" class="password-toggle" id="toggleNew">
                            👁️
                        </button>
                    </div>
                    <!-- Password Strength Indicator -->
                    <div class="password-strength" id="strengthBar"></div>
                    <span class="strength-text" id="strengthText"></span>
                </div>
                
                <!-- Confirm Password -->
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" 
                               id="confirmPassword" 
                               name="confirmPassword" 
                               class="form-control" 
                               placeholder="Confirm new password"
                               required
                               minlength="8"
                               style="padding-right: 40px;">
                        <button type="button" class="password-toggle" id="toggleConfirm">
                            👁️
                        </button>
                    </div>
                    <span class="match-error" id="matchError">Passwords do not match</span>
                </div>

                <button type="submit" class="btn btn-primary btn-login" id="submitBtn">Reset Password</button>
            </form>

            <a th:href="@{/login}" class="back-to-login">← Back to Login</a>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        // Toggle password visibility for new password
        const toggleNew = document.getElementById('toggleNew');
        const newPassword = document.getElementById('newPassword');
        
        toggleNew.addEventListener('click', function() {
            const type = newPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            newPassword.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });
        
        // Toggle password visibility for confirm password
        const toggleConfirm = document.getElementById('toggleConfirm');
        const confirmPassword = document.getElementById('confirmPassword');
        
        toggleConfirm.addEventListener('click', function() {
            const type = confirmPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPassword.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });
        
        // Password strength checker
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        
        newPassword.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            strengthBar.className = 'password-strength';
            
            if (strength === 0) {
                strengthBar.className = 'password-strength';
                strengthText.textContent = '';
                strengthText.className = 'strength-text';
            } else if (strength < 3) {
                strengthBar.className = 'password-strength weak';
                strengthText.textContent = 'Weak password';
                strengthText.className = 'strength-text weak';
            } else if (strength === 3) {
                strengthBar.className = 'password-strength medium';
                strengthText.textContent = 'Medium strength';
                strengthText.className = 'strength-text medium';
            } else {
                strengthBar.className = 'password-strength strong';
                strengthText.textContent = 'Strong password';
                strengthText.className = 'strength-text strong';
            }
        });
        
        // Check password match
        const matchError = document.getElementById('matchError');
        const submitBtn = document.getElementById('submitBtn');
        
        function checkPasswordMatch() {
            if (confirmPassword.value && newPassword.value !== confirmPassword.value) {
                matchError.style.display = 'block';
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
                submitBtn.style.cursor = 'not-allowed';
            } else {
                matchError.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                submitBtn.style.cursor = 'pointer';
            }
        }
        
        newPassword.addEventListener('input', checkPasswordMatch);
        confirmPassword.addEventListener('input', checkPasswordMatch);
        
        // Form submission validation
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            if (newPassword.value !== confirmPassword.value) {
                e.preventDefault();
                matchError.style.display = 'block';
                return false;
            }
        });
    </script>
</body>

</html>
