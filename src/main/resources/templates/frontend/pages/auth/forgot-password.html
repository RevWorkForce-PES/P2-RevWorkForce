<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - RevWorkForce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-main) 0%, #fff 100%);
            position: relative;
            overflow: hidden;
        }

        .login-page::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: 0;
        }

        .login-page::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 160, 122, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: 0;
        }

        .login-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--border-radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .login-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 10px 20px rgba(255, 140, 0, 0.3);
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            margin-top: 1rem;
            border-radius: var(--border-radius-sm);
        }

        .back-to-login {
            display: inline-block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 1.5rem;
            text-decoration: none;
            transition: color var(--transition-speed);
        }

        .back-to-login:hover {
            color: var(--primary);
        }

        .success-message {
            display: none;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: left;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-lock" style="font-size: 1.5rem;"></i></div>
            <h1 class="login-title">Reset Password</h1>
            <p class="login-subtitle">Enter your email and we'll send you a link to get back into your account.</p>

            <div class="success-message" id="successMsg" th:style="${success} ? 'display:block;' : 'display:none;'">
                <i class="fas fa-check-circle"></i> Password reset link has been sent to your registered email address.
            </div>

            <form id="forgotForm" th:action="@{/forgot-password/send}" method="post">
                <div class="form-group">
                    <label class="form-label" for="email">Work Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="e.g. name@company.com"
                        required>
                </div>

                <button type="submit" class="btn btn-primary btn-login">Send Reset Link</button>
            </form>

            <a th:href="@{/login}" class="back-to-login"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>

    <!-- Required for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>

</html>
