<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - RevWorkForce</title>

    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        :root {
            --primary: #FF8C00;
            --primary-light: #FFB04A;
            --primary-dark: #cc7000;
            --bg-main: #f8f9fc;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --text-dark: #2c3e50;
            --text-muted: #64748b;
            --border-radius-sm: 8px;
            --border-radius-lg: 16px;
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08);
            --transition-speed: 0.3s;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
        }

        .login-page {
            min-height: 100vh;
            display: flex;
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        .video-sidebar {
            width: 40%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        .video-sidebar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .login-content {
            width: 60%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            /* Align card to the right */
            justify-content: center;
            padding-right: 10%;
            /* Margin on the right side */
            position: relative;
            background: #fff;
        }

        @media (max-width: 768px) {
            .video-sidebar {
                display: none;
            }

            .login-content {
                width: 100%;
                align-items: center;
                padding-right: 2rem;
                padding-left: 2rem;
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 1;
            transition: opacity 0.6s ease-out;
        }

        .loading-overlay img {
            max-width: 300px;
            height: auto;
        }

        .login-card {
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            border-radius: 0;
            padding: 1.5rem;
            width: 100%;
            max-width: 380px;
            /* Smaller form */
            box-shadow: none;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .login-logo {
            width: 70px;
            /* Slightly smaller logo */
            height: auto;
            margin: 0 auto 1rem auto;
        }

        .login-logo img {
            width: 100%;
            height: auto;
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            border-radius: var(--border-radius-sm);
            border: 1px solid rgba(0, 0, 0, 0.1);
            background-color: #f8fafc;
            transition: all var(--transition-speed);
            font-family: inherit;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.15);
            outline: none;
            background-color: #ffffff;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            border-radius: var(--border-radius-sm);
            font-size: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            cursor: pointer;
            transition: all var(--transition-speed);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(255, 140, 0, 0.4);
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
        }

        .info-box {
            background: rgba(255, 140, 0, 0.05);
            border-left: 3px solid var(--primary);
            padding: 1rem;
            border-radius: var(--border-radius-sm);
            margin-bottom: 1.5rem;
            text-align: left;
            color: var(--text-dark);
            font-size: 0.85rem;
        }

        .back-to-login {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--primary);
            transition: all var(--transition-speed);
        }

        .back-to-login:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .alert {
            padding: 0.75rem 1.25rem;
            margin-bottom: 1rem;
            border-radius: var(--border-radius-sm);
            text-align: left;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #dc3545;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>

<body>

    <div class="login-page">
        <div class="video-sidebar">
            <img th:src="@{/assets/side.png}" alt="Side Image">
        </div>
        <div class="login-content">
            <div class="login-card">
                <div class="login-logo">
                    <img th:src="@{/assets/logo.PNG}" alt="RevWorkForce Logo">
                </div>
                <h1 class="login-title">Forgot Password?</h1>
                <p class="login-subtitle">No worries! We'll help you reset it</p>

                <!-- Error Message -->
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <!-- Info Box -->
                <div class="info-box">
                    Enter your registered email address and we'll verify your identity using security questions.
                </div>

                <!-- Form -->
                <form th:action="@{/forgot-password/verify-email}" method="post">
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control"
                            placeholder="your.email@company.com" required autofocus>
                    </div>

                    <button type="submit" class="btn-login">Continue</button>
                </form>

                <a th:href="@{/login}" class="back-to-login">← Back to Login</a>
            </div>
        </div>
    </div>
    </div>

    <script th:inline="javascript">
        // Dynamically set current year in footer
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
</body>

</html>
