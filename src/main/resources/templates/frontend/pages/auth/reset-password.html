<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="global-user-fullname" th:content="${globalFullName}">
    <meta name="global-user-role" th:content="${globalUserRole}">
    <title>Change Password - RevWorkForce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .settings-card {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: var(--shadow-sm);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <app-sidebar></app-sidebar>
        <main class="main-content">
            <app-navbar page-title="Change Password"></app-navbar>
            <div class="page-wrapper">
                <div class="settings-card">
                    <h2 class="mb-3">Update Your Password</h2>
                    <p class="text-muted mb-4">Please enter your current password and your new desired password.</p>

                    <div th:if="${error}" class="alert alert-danger"
                        style="color: #dc3545; background-color: #f8d7da; border-color: #f5c6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem; text-align: left;"
                        th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success"
                        style="color: #155724; background-color: #d4edda; border-color: #c3e6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem; text-align: left;"
                        th:text="${success}"></div>

                    <form th:action="@{/change-password}" th:object="${changePasswordRequest}" method="POST">
                        <div class="form-group">
                            <label class="form-label" for="currentPassword">Current Password</label>
                            <input type="password" id="currentPassword" th:field="*{currentPassword}"
                                class="form-control" required>
                            <span class="text-danger" style="color: red; font-size: 0.8rem;"
                                th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="newPassword">New Password</label>
                            <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control"
                                required>
                            <span class="text-danger" style="color: red; font-size: 0.8rem;"
                                th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="confirmPassword">Confirm New Password</label>
                            <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                                class="form-control" required>
                            <span class="text-danger" style="color: red; font-size: 0.8rem;"
                                th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
                        </div>

                        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                            <a th:href="@{/dashboard}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script th:src="@{/js/components.js}"></script>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
