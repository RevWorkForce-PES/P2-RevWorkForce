<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="global-user-fullname" th:content="${globalFullName}">
	<meta name="global-user-role" th:content="${globalUserRole}">
	<meta name="user-fullname" th:content="${fullName} ?: 'Manager'">
	<meta name="user-role" content="Manager">
	<title>Manager Dashboard - RevWorkForce</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<meta name="user-fullname" th:content="${fullName} ?: 'Manager'">
	<meta name="user-role" content="Manager">

	<title>Manager Dashboard - RevWorkForce</title>

	<link rel="stylesheet" th:href="@{/css/style.css}">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

	<style>
		.stats-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
			gap: 1.5rem;
			margin-bottom: 2rem;
		}

		.stat-card {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			text-align: center;
			gap: 1rem;
			padding: 2rem !important;
		}

		.stat-icon {
			width: 60px;
			height: 60px;
			border-radius: 50%;
			background: rgba(255, 140, 0, 0.1);
			color: var(--primary);
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 1.5rem;
		}

		.stat-info h3 {
			font-size: 1.8rem;
			margin-bottom: 0.2rem;
		}

		.stat-info p {
			color: var(--text-muted);
			font-size: 0.9rem;
			margin-bottom: 0;
		}

		.dashboard-option {
			border-left: 3px solid transparent;
			transition: all .2s;
		}

		.dashboard-option:hover {
			background: rgba(0, 0, 0, 0.8);
			border-left: 3px solid #000;
			color: white;
		}
	</style>

</head>

<body>

	<div class="app-container">

		<app-sidebar></app-sidebar>

		<main class="main-content">

			<app-navbar page-title="Manager Dashboard"></app-navbar>

			<div class="page-wrapper">

				<div class="stats-grid">

					<div class="card stat-card">
						<div class="stat-icon">
							<i class="fas fa-users-cog"></i>
						</div>
						<div class="stat-info">
							<h3 th:text="${teamSize}">0</h3>
							<p>Direct Reports</p>
						</div>
					</div>

					<div class="card stat-card">
						<div class="stat-icon">
							<i class="fas fa-clock"></i>
						</div>
						<div class="stat-info">
							<h3 th:text="${pendingCount}">0</h3>
							<p>Pending Leaves</p>
						</div>
					</div>

					<a th:href="@{/manager/performance}" class="card stat-card"
						style="text-decoration: none; color: inherit; transition: transform 0.2s;">
						<div class="stat-icon">
							<i class="fas fa-bullseye"></i>
						</div>
						<div class="stat-info">
							<h3 th:text="${pendingReviewsCount ?: 2}">2</h3>
							<p>Pending Reviews</p>
						</div>
					</a>

					<div class="card stat-card">
						<div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
							<i class="fas fa-calendar-alt"></i>
						</div>
						<div class="stat-info">
							<h3>3</h3>
							<p>On Leave Today</p>
						</div>
					</div>

				</div>

				<div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">



				</div>


			</div>

			<div class="card">

				<div class="card-header">
					<h2 class="card-title">Pending Approvals</h2>
				</div>

				<ul style="list-style: none; padding: 0;">

					<li th:each="leave : ${pending}"
						style="margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color);">

						<div
							style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">

							<span style="font-weight: 500;" th:text="'Leave Request #' + ${leave.applicationId}">
								Leave Request </span> <span class="badge badge-pending">Pending</span>

						</div>

						<p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem;"
							th:text="${leave.employee.fullName} + ' requested ' + ${leave.leaveType.leaveName}">
							Leave request</p> <a th:href="@{/manager/leave-approvals}" class="btn btn-primary btn-sm"
							style="display: block; text-align: center;"> Review </a>

					</li>

					<li th:if="${#lists.isEmpty(pending)}" class="text-muted">No
						pending approvals.</li>

				</ul>

			</div>

	</div>
	</div>

	</main>

	</div>

	<script th:src="@{/js/components.js}"></script>
	<script th:src="@{/js/app.js}"></script>

	<script>
		// Page specific scripts can go here
	</script>

</body>

</html>
