<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="global-user-fullname" th:content="${globalFullName}">
    <meta name="global-user-role" th:content="${globalUserRole}">
    <title>Initiate Performance Review - RevWorkForce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-container">
        <app-sidebar></app-sidebar>
        <main class="main-content">
            <app-navbar th:attribute="page-title=${pageTitle}"></app-navbar>
            <div class="page-wrapper">
                <div class="flex-space-between mb-4">
                    <a th:href="@{/manager/reviews}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Back to Team Reviews
                    </a>
                </div>

                <div class="card p-4" style="max-width: 800px; margin: 0 auto;">
                    <div style="text-align: center; margin-bottom: 2.5rem;">
                        <h2 style="margin-bottom: 0.5rem;">Initiate New Review</h2>
                        <p class="text-muted">Select a team member and the review year to start the evaluation cycle.
                        </p>
                    </div>

                    <form th:action="@{/manager/reviews/create}" th:object="${reviewDTO}" method="POST">
                        <div class="form-group mb-4">
                            <label class="form-label font-weight-bold">Select Employee</label>
                            <select class="form-control" th:field="*{employeeId}" required>
                                <option value="" disabled selected>-- Choose Team Member --</option>
                                <option th:each="member : ${teamMembers}" th:value="${member.employeeId}"
                                    th:text="${member.firstName + ' ' + member.lastName + ' (' + member.employeeId + ')'}">
                                    Alice Smith (EMP123)
                                </option>
                            </select>
                            <div class="text-danger" th:if="${#fields.hasErrors('employeeId')}"
                                th:errors="*{employeeId}"></div>
                        </div>

                        <div class="form-group mb-4">
                            <label class="form-label font-weight-bold">Review Year</label>
                            <input type="number" class="form-control" th:field="*{reviewYear}" min="2020" max="2100"
                                required>
                            <div class="text-danger" th:if="${#fields.hasErrors('reviewYear')}"
                                th:errors="*{reviewYear}"></div>
                        </div>

                        <div class="form-group mb-5">
                            <label class="form-label font-weight-bold">Review Period (Optional)</label>
                            <input type="text" class="form-control" th:field="*{reviewPeriod}"
                                placeholder="e.g., Annual 2024, Q4 2024">
                            <div class="text-danger" th:if="${#fields.hasErrors('reviewPeriod')}"
                                th:errors="*{reviewPeriod}"></div>
                        </div>

                        <div class="mb-4 p-3 alert alert-info"
                            style="display: flex; gap: 1rem; align-items: flex-start;">
                            <i class="fas fa-info-circle" style="font-size: 1.25rem; margin-top: 0.1rem;"></i>
                            <p style="margin: 0; font-size: 0.9rem;">
                                Initiating a review will notify the employee to complete their self-assessment.
                                You will be able to provide your manager evaluation once the employee submits their
                                portion.
                            </p>
                        </div>

                        <div class="flex-end">
                            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                                Initiate Review Cycle
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script th:src="@{/js/components.js}"></script>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
