<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="global-user-fullname" th:content="${globalFullName}">
    <meta name="global-user-role" th:content="${globalUserRole}">
    <title>Goal Feedback - RevWorkForce Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-container">
        <app-sidebar></app-sidebar>
        <main class="main-content">
            <app-navbar th:attr="page-title='Goal Feedback: ' + ${goalDTO.employeeName}"></app-navbar>
            <div class="page-wrapper">
                <div class="card" style="max-width: 600px; margin: 0 auto;">
                    <div class="flex-space-between mb-4">
                        <h2 style="margin: 0;">Manager Comments</h2>
                        <a th:href="@{/manager/performance}" class="btn btn-secondary btn-sm">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>

                    <div class="mb-4">
                        <p class="text-muted small text-uppercase mb-1">Reviewing Goal</p>
                        <h4 th:text="${goalDTO.goalTitle}" class="text-primary">Goal Title</h4>
                        <div class="mt-2" style="display:flex; align-items:center; gap:0.5rem;">
                            <div
                                style="background: #e2e8f0; height: 6px; flex: 1; border-radius: 3px; overflow: hidden;">
                                <div
                                    th:style="'background: var(--primary); height: 100%; width: ' + ${goalDTO.progress} + '%;'">
                                </div>
                            </div>
                            <span class="small font-weight-bold" th:text="${goalDTO.progress} + '%'">80%</span>
                        </div>
                    </div>

                    <form th:action="@{/manager/goals/comment/{id}(id=${goalDTO.goalId})}" method="POST">
                        <div class="form-group mb-4">
                            <label class="form-label font-weight-bold" for="managerComments">Add your
                                feedback/instructions</label>
                            <textarea id="managerComments" name="managerComments" class="form-control" rows="5"
                                th:text="${goalDTO.managerComments}"
                                placeholder="e.g., Looks like great progress. Focus on the documentation next..."
                                required></textarea>
                        </div>

                        <div class="flex-space-between mt-4">
                            <p class="text-muted small"><i class="fas fa-bell"></i> Employee will be notified of your
                                comment.</p>
                            <button type="submit" class="btn btn-primary">Submit Feedback</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/components.js}"></script>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
