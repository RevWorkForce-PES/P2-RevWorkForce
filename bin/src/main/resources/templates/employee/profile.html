<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}"></head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <div class="container mt-4">
        <!-- Page Header -->
        <div class="row mb-4">
            <div class="col-md-8">
                <h2>
                    <i class="fas fa-user me-2"></i>My Profile
                </h2>
            </div>
            <div class="col-md-4 text-end">
                <a th:href="@{/employee/profile/edit}" class="btn btn-warning">
                    <i class="fas fa-edit me-2"></i>Edit Profile
                </a>
            </div>
        </div>
        
        <!-- Success Message -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <!-- Profile Card -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3 text-center">
                        <div class="avatar-large mb-3">
                            <span th:text="${#strings.substring(employee.firstName, 0, 1) + #strings.substring(employee.lastName, 0, 1)}"></span>
                        </div>
                        <h4 th:text="${employee.fullName}"></h4>
                        <p class="text-muted" th:text="${employee.designationName}"></p>
                        <p class="text-muted" th:text="${employee.departmentName}"></p>
                        <span class="badge bg-success" th:text="${employee.status}"></span>
                    </div>
                    
                    <div class="col-md-9">
                        <!-- Personal Information -->
                        <h5 class="border-bottom pb-2 mb-3">Personal Information</h5>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <strong>Employee ID:</strong>
                                <p th:text="${employee.employeeId}"></p>
                            </div>
                            <div class="col-md-6">
                                <strong>Email:</strong>
                                <p th:text="${employee.email}"></p>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <strong>Phone:</strong>
                                <p th:text="${employee.phone}"></p>
                            </div>
                            <div class="col-md-6">
                                <strong>Date of Birth:</strong>
                                <p th:text="${#temporals.format(employee.dateOfBirth, 'dd MMM yyyy')}"></p>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-12">
                                <strong>Address:</strong>
                                <p th:text="${employee.address + ', ' + employee.city + ', ' + employee.state + ' - ' + employee.postalCode}"></p>
                            </div>
                        </div>
                        
                        <!-- Employment Information -->
                        <h5 class="border-bottom pb-2 mb-3 mt-4">Employment Information</h5>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <strong>Reporting To:</strong>
                                <p th:text="${employee.managerName != null ? employee.managerName : 'No Manager'}"></p>
                            </div>
                            <div class="col-md-6">
                                <strong>Joining Date:</strong>
                                <p th:text="${#temporals.format(employee.joiningDate, 'dd MMM yyyy')}"></p>
                            </div>
                        </div>
                        
                        <!-- Emergency Contact -->
                        <h5 class="border-bottom pb-2 mb-3 mt-4">Emergency Contact</h5>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <strong>Contact Name:</strong>
                                <p th:text="${employee.emergencyContactName}"></p>
                            </div>
                            <div class="col-md-6">
                                <strong>Contact Phone:</strong>
                                <p th:text="${employee.emergencyContactPhone}"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Quick Stats -->
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h3 class="text-success">0</h3>
                        <p class="mb-0">Leave Balance</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h3 class="text-info">0</h3>
                        <p class="mb-0">Active Goals</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h3 class="text-warning">0</h3>
                        <p class="mb-0">Pending Reviews</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/footer :: scripts}"></div>
    
    <style>
        .avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00897B, #00695C);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 48px;
        }
    </style>
</body>
</html>
