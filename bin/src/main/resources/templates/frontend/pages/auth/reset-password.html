<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - RevWorkForce</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .settings-card {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: var(--shadow-sm);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <app-sidebar></app-sidebar>
        <main class="main-content">
            <app-navbar page-title="Change Password"></app-navbar>
            <div class="page-wrapper">
                <div class="settings-card">
                    <h2 class="mb-3">Update Your Password</h2>
                    <p class="text-muted mb-4">Please enter your current password and your new desired password.</p>

                    <form
                        onsubmit="event.preventDefault(); alert('Password successfully updated!'); window.location.href = 'index.html';">
                        <div class="form-group">
                            <label class="form-label" for="currentPwd">Current Password</label>
                            <input type="password" id="currentPwd" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="newPwd">New Password</label>
                            <input type="password" id="newPwd" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="confirmPwd">Confirm New Password</label>
                            <input type="password" id="confirmPwd" class="form-control" required>
                        </div>

                        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                            <button type="button" class="btn btn-secondary"
                                onclick="window.location.href = 'index.html';">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../../js/components.js"></script>
    <script src="../../js/app.js"></script>
</body>

</html>
